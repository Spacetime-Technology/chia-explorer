name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm audit --audit-level=high
      - name: Assert package.json and server.json versions in sync
        run: |
          pkg=$(node -p "require('./package.json').version")
          server=$(node -p "require('./server.json').version")
          [ "$pkg" = "$server" ] || { echo "version drift: package.json=$pkg server.json=$server"; exit 1; }
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run format:check
      - run: npm test
      - run: npm run build
